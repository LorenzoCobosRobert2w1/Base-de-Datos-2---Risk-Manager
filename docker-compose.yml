version: "3.9"

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: antifraude-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (interfaz web)
      - "7687:7687"   # Bolt protocol (driver / cypher-shell)
    environment:
      - NEO4J_AUTH=neo4j/antifraude123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./seed:/var/lib/neo4j/import   # los .cypher quedan disponibles dentro del container
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
